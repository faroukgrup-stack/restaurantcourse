<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دورة إدارة المطاعم - منصة فاروق للتدريب</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== المتغيرات والأساس ===== */
    :root {
      --gold: #b8860b; --gold-light: #d4af37; --gold-glow: rgba(184, 134, 11, 0.4);
      --dark: #0b0d14; --dark-panel: #141821; --card-bg: #1a1f2b;
      --text-light: #f0f2f5; --text-muted: #a0aec0; --border-gold: rgba(184, 134, 11, 0.2);
      --shadow-gold: 0 8px 32px rgba(184, 134, 11, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Tajawal', sans-serif; background: #0b0d14; color: var(--text-light); }
    #app { display: flex; flex-direction: column; height: 100vh; max-height: 100vh; overflow: hidden; }
    header {
      flex-shrink: 0; background: linear-gradient(135deg, #0b0d14 0%, #1a1f2b 60%, var(--gold) 100%);
      padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--border-gold); box-shadow: 0 4px 20px rgba(0,0,0,0.6); z-index: 10;
    }
    header .brand { display: flex; align-items: center; gap: 12px; }
    header .brand h1 {
      font-size: 1.6rem; font-weight: 900; background: linear-gradient(to left, var(--gold-light), #fff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0;
    }
    header .brand i { color: var(--gold-light); font-size: 1.8rem; filter: drop-shadow(0 0 8px var(--gold-glow)); }
    header .sub-title { color: var(--text-muted); font-size: 0.85rem; font-weight: 300; letter-spacing: 1px; }
    .logout-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-gold); border-radius: 50px;
      padding: 8px 22px; color: var(--text-light); font-weight: 700; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; gap: 10px; font-size: 0.9rem; backdrop-filter: blur(4px);
    }
    .logout-btn:hover { background: var(--gold); color: #0b0d14; border-color: var(--gold-light); box-shadow: 0 0 25px var(--gold-glow); transform: translateY(-2px); }
    .container {
      flex: 1; display: flex; gap: 20px; padding: 20px 25px; overflow: hidden;
      max-width: 1600px; margin: 0 auto; width: 100%;
      background: radial-gradient(circle at 10% 20%, #11161f, #080a10);
    }
    .sidebar {
      flex: 0 0 380px; background: var(--dark-panel); border-radius: 24px;
      border: 1px solid var(--border-gold); box-shadow: var(--shadow-gold);
      display: flex; flex-direction: column; overflow: hidden; height: 100%; backdrop-filter: blur(8px);
    }
    .sidebar-header {
      padding: 18px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-header h2 { font-size: 1.3rem; font-weight: 900; color: var(--gold-light); display: flex; align-items: center; gap: 10px; margin: 0; }
    .sidebar-header .lesson-counter { font-size: 0.85rem; color: var(--text-muted); background: rgba(255,255,255,0.06); padding: 4px 14px; border-radius: 30px; border: 1px solid var(--border-gold); white-space: nowrap; }
    .lesson-counter span { color: var(--gold-light); font-weight: 700; }
    .progress-section { background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 14px; margin: 5px 16px 10px; border: 1px solid rgba(255,255,255,0.04); }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
    .progress-header .progress-text { color: var(--gold-light); font-weight: 700; }
    .progress-bar-container { height: 6px; background: #2a2f3a; border-radius: 10px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 15px var(--gold-glow); }
    .scroll-area { flex: 1; overflow-y: auto; padding: 10px 12px 20px; direction: rtl; }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    .topic-header {
      display: flex; align-items: center; gap: 10px; background: rgba(184,134,11,0.08); padding: 10px 14px;
      margin: 16px 0 8px; border-radius: 12px; border-right: 3px solid var(--gold); font-weight: 700; font-size: 0.9rem; color: var(--gold-light);
    }
    .topic-header i { font-size: 0.9rem; }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar ul li {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px; margin: 4px 0;
      background: rgba(255,255,255,0.02); border-radius: 12px; cursor: pointer;
      transition: all 0.25s ease; font-size: 0.9rem; color: var(--text-muted);
      border: 1px solid transparent; line-height: 1.4;
    }
    .sidebar ul li i { font-size: 1rem; color: var(--text-muted); width: 18px; flex-shrink: 0; transition: 0.2s; }
    .sidebar ul li:hover { background: rgba(184,134,11,0.08); border-color: var(--border-gold); color: #fff; transform: translateX(-3px); }
    .sidebar ul li.active { background: linear-gradient(135deg, rgba(184,134,11,0.2), rgba(184,134,11,0.05)); border-color: var(--gold); color: #fff; }
    .sidebar ul li.active i { color: var(--gold-light); }
    .sidebar ul li.completed i { color: #2ecc71; }
    .sidebar ul li.completed { opacity: 0.8; }
    .sidebar ul li .lesson-num { font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 0 8px; border-radius: 20px; color: var(--text-muted); margin-right: auto; }
    .download-section { padding: 12px 16px 18px; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.04); }
    .download-all {
      display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0b0d14; padding: 12px; border-radius: 50px; text-decoration: none; font-weight: 900; transition: 0.3s; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(184,134,11,0.3);
    }
    .download-all:hover { background: linear-gradient(135deg, #fff, var(--gold-light)); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(184,134,11,0.5); color: #000; }

    /* قسم زر الاختبار في الشريط الجانبي */
    #examSection {
      padding: 8px 16px 16px;
      flex-shrink: 0;
      text-align: center;
    }
    #examBtn {
      width: 100%;
      background: linear-gradient(135deg, #00b894, #00cec9); /* لون مميز للاختبار */
      color: #0b0d14;
      padding: 12px;
      border-radius: 50px;
      font-weight: 900;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #examBtn:hover {
      background: linear-gradient(135deg, #00cec9, #00b894);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 184, 148, 0.5);
    }

    .content {
      flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
      height: 100%; background: var(--dark-panel); border-radius: 24px;
      border: 1px solid var(--border-gold); box-shadow: var(--shadow-gold); padding: 20px 25px;
    }
    .video-container { flex: 1 1 auto; min-height: 480px; position: relative; width: 100%; background: #000; border-radius: 18px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.05); }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; }
    .video-blocker {
      position: absolute;
      top: 0;
      right: 0;        /* الأيقونة تظهر في الزاوية اليمنى العليا لأن الصفحة RTL */
      width: 60px;
      height: 60px;
      background: transparent;
      z-index: 5;
      pointer-events: auto;   /* يمنع النقر خلفه */
    }
    .video-controls { display: flex; gap: 15px; margin-top: 15px; flex-shrink: 0; flex-wrap: wrap; padding: 5px 0; }
    .fullscreen-btn, .download-resource {
      display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); backdrop-filter: blur(4px);
      border: 1px solid var(--border-gold); color: var(--text-light); padding: 10px 24px; border-radius: 50px;
      font-weight: 700; cursor: pointer; transition: 0.3s; text-decoration: none; font-size: 0.9rem;
    }
    .fullscreen-btn:hover, .download-resource:hover { background: var(--gold); color: #0b0d14; border-color: var(--gold-light); box-shadow: 0 0 25px var(--gold-glow); transform: translateY(-2px); }
    .lesson-description {
      flex-shrink: 0; max-height: 140px; overflow-y: auto; margin-top: 15px; padding: 14px 18px;
      background: rgba(255,255,255,0.02); border-radius: 18px; border: 1px solid rgba(255,255,255,0.04);
    }
    .lesson-description::-webkit-scrollbar { width: 3px; }
    .lesson-description::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    .lesson-description h4 { color: var(--gold-light); font-size: 1rem; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
    .lesson-description p { color: var(--text-muted); line-height: 1.6; font-size: 0.9rem; margin: 0; }
    .lesson-meta { display: flex; gap: 25px; margin-top: 8px; font-size: 0.8rem; color: #5a6678; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 8px; }
    .lesson-meta i { color: var(--gold-light); margin-left: 6px; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .login-card { background: var(--dark-panel); border: 1px solid var(--border-gold); border-radius: 30px; padding: 2.5rem 2.8rem; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.8); animation: fadeInUp 0.5s ease; }
    .login-card .logo-icon { font-size: 3rem; color: var(--gold-light); margin-bottom: 10px; filter: drop-shadow(0 0 20px var(--gold-glow)); }
    .login-card h2 { font-size: 1.8rem; font-weight: 900; color: var(--gold-light); margin-bottom: 6px; }
    .login-card p { color: var(--text-muted); margin-bottom: 1.8rem; font-size: 0.95rem; }
    .password-field { width: 100%; padding: 1rem 1.5rem; background: rgba(0,0,0,0.5); border: 1px solid var(--border-gold); border-radius: 60px; font-family: 'Tajawal', sans-serif; font-size: 1rem; text-align: right; margin-bottom: 1rem; color: #fff; outline: none; transition: 0.3s; }
    .password-field:focus { border-color: var(--gold-light); box-shadow: 0 0 0 4px rgba(184,134,11,0.15); }
    .login-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; border-radius: 60px; font-family: 'Tajawal', sans-serif; font-size: 1.2rem; font-weight: 900; color: #0b0d14; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .login-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px var(--gold-glow); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .whatsapp-link { display: block; margin-top: 18px; color: var(--text-muted); font-size: 0.85rem; text-decoration: none; transition: 0.2s; }
    .whatsapp-link:hover { color: var(--gold-light); }
    .error-msg { color: #f87171; margin-top: 14px; font-weight: 600; font-size: 0.9rem; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 992px) {
      .container { flex-direction: column; padding: 15px; gap: 15px; }
      .sidebar { flex: none; height: 45%; width: 100%; }
      .content { height: 55%; padding: 15px; }
      .video-container { min-height: 300px; }
    }
    @media (max-width: 600px) {
      header { padding: 10px 15px; }
      .container { padding: 10px; gap: 10px; }
      .sidebar { height: 40%; }
      .content { height: 60%; padding: 12px; }
      .video-container { min-height: 220px; }
    }
  </style>
</head>

      { category: "الأخطاء الشائعة، الرقابة، والاستدامة التشغيلية", title: "القرارات اليومية الصغيرة التي تقتل الربحية بدون ما ننتبه", 
        videoLink: TEMP_VIDEO_LINK, duration: "19:40", description: "تأثير القرارات الصغيرة التراكمية على تآكل الأرباح.", attachments: "" },
      { category: "الأخطاء الشائعة، الرقابة، والاستدامة التشغيلية", title: "الرقابة الذكية: كيف نمنع الانحراف بدون ما نخنق التشغيل", 
        videoLink: TEMP_VIDEO_LINK, duration: "20:15", description: "رقابة ذكية تحمي الأرباح دون أن تثقل كاهل الفريق.", attachments: "" },
      { category: "الأخطاء الشائعة، الرقابة، والاستدامة التشغيلية", title: "الاستدامة التشغيلية: كيف نحمي المطعم من الرجوع للأخطاء", 
        videoLink: TEMP_VIDEO_LINK, duration: "18:50", description: "كيف تجعل الإصلاحات دائمة ولا تعود الأخطاء للظهور مجدداً.", attachments: "" }
    ];

    const TOTAL_LESSONS = allLessons.length;

    let completedVideos = [];
    let currentUserEmail = "";

    const listContainer = document.getElementById('lectureList');
    const videoPlayer = document.getElementById('videoPlayer');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const currentLessonNumSpan = document.getElementById('currentLessonNum');
    const totalLessonsNumSpan = document.getElementById('totalLessonsNum');
    const descriptionText = document.getElementById('descriptionText');
    const durationSpan = document.getElementById('duration');
    const attachmentsSpan = document.getElementById('attachments');
    const downloadResourceBtn = document.getElementById('downloadResourceBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const examSection = document.getElementById('examSection');

    const loginOverlay = document.getElementById('loginOverlay');
    const mainContent = document.getElementById('mainContent');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    totalLessonsNumSpan.textContent = TOTAL_LESSONS;

    // ===== دوال الخادم =====
    async function saveProgressToServer(lessonIndex0Based) {
      if (!currentUserEmail) return;
      try {
        const lessonNumber = lessonIndex0Based + 1;
        let formData = new FormData();
        formData.append('username', currentUserEmail);
        formData.append('lessonIndex', lessonNumber);
        formData.append('action', 'saveProgress');
        let resp = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData });
        let result = await resp.json();
        if (result.status !== 'success') console.warn('فشل حفظ التقدم:', result.message);
      } catch (e) { console.error(e); }
    }

    async function loadProgressFromServer(email) {
      try {
        let formData = new FormData();
        formData.append('username', email);
        formData.append('action', 'getProgress');
        let resp = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData });
        let data = await resp.json();
        if (data.status === 'success') {
          return data.completed.map(num => num - 1);
        }
      } catch (e) { console.error(e); }
      return [];
    }

    // ===== بناء القائمة =====
    function createLectureList() {
      listContainer.innerHTML = '';
      const grouped = {};
      allLessons.forEach((lesson, idx) => {
        if (!grouped[lesson.category]) grouped[lesson.category] = [];
        grouped[lesson.category].push({ ...lesson, index: idx });
      });

      for (const [cat, lessons] of Object.entries(grouped)) {
        const header = document.createElement('div');
        header.className = 'topic-header';
        header.innerHTML = `<i class="fa-regular fa-folder-open"></i> ${cat}`;
        listContainer.appendChild(header);

        const ul = document.createElement('ul');
        lessons.forEach((lesson) => {
          const idx = lesson.index;
          const li = document.createElement('li');
          li.className = 'video-item';
          li.innerHTML = `<i class="fa-regular fa-circle-play"></i><span>${lesson.title}</span><span class="lesson-num">${idx+1}</span>`;
          li.dataset.video = lesson.videoLink || '';
          li.dataset.index = idx;

          if (completedVideos.includes(idx)) {
            li.classList.add('completed');
            li.querySelector('i').className = 'fa-regular fa-circle-check';
          }

          li.addEventListener('click', async () => {
            document.querySelectorAll('.video-item').forEach(v => {
              v.classList.remove('active');
              if (!v.classList.contains('completed')) v.querySelector('i').className = 'fa-regular fa-circle-play';
            });
            li.classList.add('active');
            li.querySelector('i').className = 'fa-regular fa-circle-play';

            const videoSrc = li.dataset.video;
            if (videoSrc && videoSrc.startsWith('http')) videoPlayer.src = videoSrc;
            else videoPlayer.src = '';

            const lessonData = allLessons[idx];
            currentLessonNumSpan.textContent = idx + 1;
            descriptionText.innerText = lessonData.description || 'لا يوجد وصف';
            durationSpan.innerText = lessonData.duration || '00:00';
            attachmentsSpan.innerText = lessonData.attachments || 'لا يوجد';
            downloadResourceBtn.style.display = (lessonData.attachments && lessonData.attachments !== 'لا يوجد') ? 'inline-flex' : 'none';

            if (!completedVideos.includes(idx)) {
              completedVideos.push(idx);
              await saveProgressToServer(idx);
              li.classList.add('completed');
              li.querySelector('i').className = 'fa-regular fa-circle-check';
            }

            updateProgress();
            checkAllCompleted();
          });

          ul.appendChild(li);
        });
        listContainer.appendChild(ul);
      }

      // تشغيل آخر درس تم النقر عليه، أو الأول
      if (completedVideos.length > 0) {
        const lastClickedIndex = completedVideos[completedVideos.length - 1];
        const targetLi = document.querySelector(`.video-item[data-index="${lastClickedIndex}"]`);
        if (targetLi) targetLi.click();
        else {
          const firstLi = document.querySelector('.video-item');
          if (firstLi) firstLi.click();
        }
      } else {
        const firstLi = document.querySelector('.video-item');
        if (firstLi) firstLi.click();
      }
      updateProgress();
    }

    function updateProgress() {
      const completedCount = completedVideos.length;
      const percent = Math.round((completedCount / TOTAL_LESSONS) * 100);
      progressBar.style.width = percent + '%';
      progressPercent.innerText = percent + '%';
      checkAllCompleted();
    }

    function checkAllCompleted() {
      if (completedVideos.length >= TOTAL_LESSONS) {
        examSection.style.display = 'block';
      } else {
        examSection.style.display = 'none';
      }
    }

    function openFullscreen() {
      const box = document.getElementById('videoBox');
      if (box.requestFullscreen) box.requestFullscreen();
      else if (box.webkitRequestFullscreen) box.webkitRequestFullscreen();
      else if (box.msRequestFullscreen) box.msRequestFullscreen();
    }

    // ===== تسجيل الدخول =====
    function isValidEmail(email) { return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email); }

    async function attemptLogin() {
      const user = usernameInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!user || !pass) { errorMsg.textContent = '❌ يرجى إدخال البريد الإلكتروني وكلمة المرور'; return; }
      if (!isValidEmail(user)) { errorMsg.textContent = '❌ البريد الإلكتروني غير صالح'; return; }

      loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحقق...';
      loginBtn.disabled = true;
      errorMsg.textContent = '';

      try {
        let formData = new FormData();
        formData.append('username', user);
        formData.append('password', pass);
        const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();

        if (result.status === 'success') {
          sessionStorage.setItem('portalLoggedIn', 'true');
          sessionStorage.setItem('portalUserName', result.name || user);
          sessionStorage.setItem('portalUserEmail', user);
          currentUserEmail = user;

          completedVideos = await loadProgressFromServer(user);

          loginOverlay.style.display = 'none';
          mainContent.style.display = 'flex';
          logoutBtn.style.display = 'flex';
          createLectureList();
        } else {
          errorMsg.textContent = '❌ ' + (result.message || 'بيانات دخول خاطئة');
        }
      } catch (error) {
        console.error(error);
        errorMsg.textContent = '❌ حدث خطأ في الاتصال بالخادم';
      } finally {
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
        loginBtn.disabled = false;
      }
    }

    function checkSession() {
      if (sessionStorage.getItem('portalLoggedIn') === 'true') {
        loginOverlay.style.display = 'none';
        mainContent.style.display = 'flex';
        logoutBtn.style.display = 'flex';
        currentUserEmail = sessionStorage.getItem('portalUserEmail') || ''; 
        loadProgressFromServer(currentUserEmail).then(arr => {
          completedVideos = arr;
          createLectureList();
        });
      } else {
        loginOverlay.style.display = 'flex';
        mainContent.style.display = 'none';
        logoutBtn.style.display = 'none';
      }
    }

    function logout() {
      sessionStorage.removeItem('portalLoggedIn');
      sessionStorage.removeItem('portalUserName');
      sessionStorage.removeItem('portalUserEmail'); 
      loginOverlay.style.display = 'flex';
      mainContent.style.display = 'none';
      logoutBtn.style.display = 'none';
      usernameInput.value = '';
      passwordInput.value = '';
      errorMsg.textContent = '';
      videoPlayer.src = '';
      completedVideos = [];
      currentUserEmail = '';
      examSection.style.display = 'none';
      currentLessonNumSpan.textContent = '1';
      descriptionText.innerText = 'سيظهر هنا ملخص الدرس عند اختياره';
      durationSpan.innerText = '00:00';
      attachmentsSpan.innerText = 'لا يوجد';
    }

    // ===== أحداث =====
    loginBtn.addEventListener('click', attemptLogin);
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });
    usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passwordInput.focus(); });
    logoutBtn.addEventListener('click', logout);
    downloadAllBtn.addEventListener('click', (e) => { e.preventDefault(); alert('📁 سيتم تجميع جميع ملفات الدورة للتحميل (وظيفة قيد التطوير)'); });

    document.getElementById('examBtn')?.addEventListener('click', () => {
      window.location.href = 'examSection.html';
    });

    window.addEventListener('load', checkSession);
  </script>
</body>
</html>
